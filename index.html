<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base target="_blank">
  <title>Cronômetro de Estudo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ─── Fundo Nebulosa ─────────────────────── -->
  <div class="canvas" id="canvas">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="blob blob-5"></div>
    <div class="line line-1"></div>
    <div class="line line-2"></div>
    <div class="line line-3"></div>
    <div class="line line-4"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
    <div class="dot dot-4"></div>
    <div class="dot dot-5"></div>
    <div class="dot dot-6"></div>
    <div class="grain"></div>
  </div>

  <!-- ─── Cronômetro ────────────────────────── -->
  <div class="allMov">
    <div class="card">
      <div class="descanso-timer">⏳ Descanso: 02:00:00</div>

      <div class="header">
        <div class="dot-status inactive" id="dot"></div>
        <span class="header-title">Foco</span>
        <span class="header-tag">2.0</span>
      </div>

      <div class="progress-wrap">
        <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <circle class="progress-track" cx="80" cy="80" r="70" />
          <circle class="progress-fill" id="progressRing" cx="80" cy="80" r="70" />
        </svg>
        <div class="progress-center">
          <div class="time-value" id="contador">00:00</div>
          <div class="time-label">restante</div>
        </div>
      </div>

      <div class="input-group">
        <div class="input-row">
          <label class="input-label" for="tempo">Duração</label>
          <div class="radio-group">
            <label><input type="radio" name="unidade" value="min" checked> Minutos</label>
            <label><input type="radio" name="unidade" value="hora"> Horas</label>
          </div>
        </div>
        <div class="input-row">
          <input class="input-field" type="text" id="tempo" placeholder="25 ou 1:10 ou 1;2;3">
          <div class="unit-badge">tempo</div>
        </div>
        <div class="input-row time-interval" >
          <label for="pausar">Pausa Rápida</label>
          <input class="input-field" id="pausar" placeholder="05" type="number" min="1" max="20">
          <label for="interval">Intervalo de Estudo</label>
          <input class="input-field" id="interval" placeholder="40" type="number" min="1" max="60">
        </div>
      </div>

      <div class="status-bar" id="status">— aguardando início —</div>

      <div class="btn-row">
        <button class="btn btn-primary" id="btnIniciar" onclick="iniciar()">Iniciar</button>
        <button class="btn btn-secondary" id="btnReset" onclick="resetar()" disabled>Resetar</button>
      </div>

      <div class="sessions">
        <span class="sessions-label">Sessões</span>
        <div class="sessions-dots" id="sessionDots">
          <div class="session-dot"></div>
          <div class="session-dot"></div>
          <div class="session-dot"></div>
          <div class="session-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <audio id="somInicio" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
  <audio id="somFim" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto"></audio>
  <audio id="somDescanso" src="https://actions.google.com/sounds/v1/alarms/medium_bell_ringing_near.ogg" preload="auto"></audio>

  <script src="scripts.js"></script>
</body>

</html>
